<style>
  :root{
    --bg:#FFFFFF; --ink:#111111; --muted:#7a7a7a; --muted-2:#9a9a9a;
    --stage:#D9D9D9; --bar:#B3B3B3; --track:#FFFFFF; --arrowbg:#9E9E9E; --icon:#3a3a3a;
    --line:#E4E4E4; --line-2:#D2D2D2; --panel:#FFFFFF; --field:#F4F4F4; --accent:#111111;
    --font:'Inter','Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.4}
  .wrap{min-height:100vh;max-width:1500px;margin:0 auto;padding:40px 46px 28px;display:flex;flex-direction:column}

  h1{font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0 0 26px}

  .studio{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:40px;align-items:start;flex:1}
  @media(max-width:960px){.studio{grid-template-columns:1fr}}

  .stage{width:100%}
  .screen{position:relative;background:var(--stage);aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center}
  canvas#cv{display:block;max-width:100%;max-height:100%;width:auto;height:auto}
  .dropzone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;cursor:pointer;transition:background .15s;color:var(--icon)}
  .dropzone.hot{background:#cdcdcd}
  .dz-circle{display:grid;place-items:center}
  .dz-circle svg{width:46px;height:46px;color:var(--icon)}
  .dz-text{font-size:16px;color:#5a5a5a}
  .hidden{display:none!important}

  .transport{display:flex;align-items:center;gap:16px;padding:14px 18px;background:var(--bar)}
  .pp{background:none;border:none;cursor:pointer;color:var(--icon);display:grid;place-items:center;padding:0;width:24px;height:24px;flex:none}
  .pp svg{width:20px;height:20px}
  .pp:disabled{opacity:.55;cursor:default}
  .scrub{flex:1;display:flex;align-items:center;gap:14px}
  .time{font-size:13px;color:#efefef;min-width:96px;text-align:right;font-variant-numeric:tabular-nums}
  input[type=range].timeline{flex:1}

  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:var(--track);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ink);border:none}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--ink);border:none}
  input[type=range]:disabled{opacity:.5;cursor:default}
  .panel input[type=range]{background:var(--line-2);height:4px}

  .panel{background:var(--panel);border:1px solid var(--line)}
  .sect{padding:18px 18px 20px;border-bottom:1px solid var(--line)}
  .sect:last-child{border-bottom:none}
  .sect-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sect-h .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .reset{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer}
  .reset:hover{color:var(--ink)}

  .fx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .fx{font-size:12px;padding:10px 5px;border:1px solid var(--line-2);background:#fff;color:var(--ink);cursor:pointer;transition:.12s;text-align:center;line-height:1.25}
  .fx:hover{border-color:var(--ink)}
  .fx.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .fx small{display:block;font-size:9px;color:var(--muted-2);margin-top:3px;letter-spacing:.02em}
  .fx.on small{color:#c9c9c9}

  .ctrl{margin-bottom:14px}
  .ctrl:last-child{margin-bottom:0}
  .ctrl-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .ctrl-h label{font-size:13px}
  .hint{font-size:11px;color:var(--muted)}
  .val{font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums}
  .ctrl input[type=range]{width:100%}

  .colors{display:flex;gap:16px;margin-top:4px}
  .colorpick{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .colorpick input[type=color]{width:28px;height:28px;border:1px solid var(--line-2);background:none;cursor:pointer;padding:2px}

  .fmt-row{display:flex;gap:6px;margin-bottom:12px}
  .fmt{flex:1;font-size:11px;letter-spacing:.04em;padding:9px;border:1px solid var(--line-2);background:#fff;color:var(--muted);cursor:pointer;text-align:center}
  .fmt.on{border-color:var(--ink);color:var(--ink);background:#fff;font-weight:500}

  .btn{width:100%;padding:13px;border:none;cursor:pointer;font-family:var(--font);font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.12s}
  .btn svg{width:16px;height:16px}
  .btn-go{background:var(--ink);color:#fff}
  .btn-go:hover{background:#000}
  .btn:disabled{opacity:.4;cursor:default}
  .prog{height:4px;background:var(--line-2);margin-top:12px;overflow:hidden;display:none}
  .prog.show{display:block}
  .prog-fill{height:100%;width:0;background:var(--ink);transition:width .15s}
  .rec-note{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}
  .warn{font-size:11px;color:#9a5b00;background:#fff6e8;border:1px solid #f0d9a8;padding:9px 11px;margin-top:11px;line-height:1.5;display:none}
  .warn.show{display:block}

  /* footer: credits left, logos right */
  .footer{display:flex;justify-content:space-between;align-items:flex-end;gap:26px;margin-top:36px}
  .foot-left{font-style:italic;font-size:15px;color:#6a6a6a;line-height:1.5}
  .foot-left a{color:#6a6a6a;text-decoration:underline;text-underline-offset:2px}
  .foot-left a:hover{color:var(--ink)}
  .foot-logos{display:flex;align-items:center;gap:28px}
  .lg{display:block;width:auto}
  .lg-cw{height:47px}
  .lg-bird{height:47px}
  .lg-ais{height:29px}
  @media(max-width:600px){.footer{gap:16px;flex-wrap:wrap}.foot-logos{gap:18px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>videotools.</h1>

  <div class="studio">
    <div class="stage">
      <div class="screen" id="screen">
        <canvas id="cv" width="1280" height="720"></canvas>
        <div class="dropzone" id="dz">
          <div class="dz-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 4v13" stroke-linecap="round"/>
              <path d="M6 11l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="dz-text">drag and drop or click here</div>
        </div>
      </div>
      <div class="transport">
        <button class="pp" id="pp" disabled aria-label="Play">
          <svg id="ppIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="scrub">
          <input type="range" class="timeline" id="timeline" min="0" max="100" value="0" step="0.05" disabled>
          <span class="time" id="time">00:00/00:00</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="sect">
        <div class="sect-h"><span class="lbl">Effect</span></div>
        <div class="fx-grid" id="fxGrid"></div>
      </div>
      <div class="sect">
        <div class="sect-h"><span class="lbl">Adjust</span><button class="reset" id="resetFx">reset</button></div>
        <div id="fxControls"></div>
        <div class="colors hidden" id="duoColors">
          <label class="colorpick">shadows <input type="color" id="colA" value="#1B1E3B"></label>
          <label class="colorpick">highlights <input type="color" id="colB" value="#E8A23D"></label>
        </div>
      </div>
      <div class="sect">
        <div class="sect-h"><span class="lbl">Tone</span><button class="reset" id="resetTone">reset</button></div>
        <div id="toneControls"></div>
      </div>
      <div class="sect">
        <div class="sect-h"><span class="lbl">Export</span></div>
        <div class="fmt-row">
          <button class="fmt on" id="fmtMp4" data-fmt="mp4">MP4 · H.264</button>
          <button class="fmt" id="fmtWebm" data-fmt="webm">WEBM · VP9</button>
        </div>
        <button class="btn btn-go" id="export" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M12 3v12M12 15l-4-4M12 15l4-4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 21h16" stroke-linecap="round"/>
          </svg>
          <span id="exportLabel">Export with effect</span>
        </button>
        <div class="prog" id="prog"><div class="prog-fill" id="progFill"></div></div>
        <div class="rec-note" id="recNote"></div>
        <div class="warn" id="warn"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="foot-left">videotools. by codewise Ver 1.0 stable<br>
      for questions: <a href="https://t.me/wholelottatrapshit" target="_blank" rel="noopener">telegram</a></div>

<script>
"use strict";
const $ = s => document.querySelector(s);

/* ============ elements ============ */
const cv = $('#cv');
const video = document.createElement('video');
video.playsInline = true; video.muted = false; video.preload = 'auto';
const screen = $('#screen'), dz = $('#dz'), fileInput = $('#file');
const pp = $('#pp'), ppIcon = $('#ppIcon'), timeline = $('#timeline'), timeEl = $('#time');
const exportBtn = $('#export'), exportLabel = $('#exportLabel');
const prog = $('#prog'), progFill = $('#progFill'), recNote = $('#recNote'), warn = $('#warn');
const duoColors = $('#duoColors'), colA = $('#colA'), colB = $('#colB');

let currentFile = null, exporting = false, exportFmt = 'mp4';

/* ============ WebGL ============ */
const gl = cv.getContext('webgl', {preserveDrawingBuffer:true, premultipliedAlpha:false})
        || cv.getContext('experimental-webgl', {preserveDrawingBuffer:true});
if(!gl){ alert('WebGL is not available in this browser'); }

const VERT = `
attribute vec2 aPos; varying vec2 vUv;
void main(){ vUv = aPos*0.5+0.5; gl_Position = vec4(aPos,0.0,1.0); }`;

const PRELUDE = `
precision highp float;
varying vec2 vUv;
uniform sampler2D uTex;
uniform vec2 uRes;
uniform float uTime, uIntensity, uParam, uBright, uContrast, uSat;
uniform vec3 uColA, uColB;
float luma(vec3 c){ return dot(c, vec3(0.299,0.587,0.114)); }
vec3 adj(vec3 c){ c=(c-0.5)*uContrast+0.5; c*=uBright; float l=luma(c); c=mix(vec3(l),c,uSat); return clamp(c,0.0,1.0); }
float rnd(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
`;

/* ---- effects. s1 drives uIntensity, s2 drives uParam (with their own labels) ---- */
const FX = {
  clean: {name:'Clean', tag:'tone', frag:`
    void main(){ vec2 uv=vec2(vUv.x,1.0-vUv.y);
      gl_FragColor=vec4(adj(texture2D(uTex,uv).rgb),1.0); }`},

  bw: {name:'B&W', tag:'1-bit', s1:{l:'Grain',d:45}, s2:{l:'Threshold',d:50}, frag:`
    void main(){ vec2 uv=vec2(vUv.x,1.0-vUv.y);
      float l=luma(adj(texture2D(uTex,uv).rgb));
      float thr=mix(0.28,0.72,uParam);
      float n=(rnd(uv*uRes + fract(uTime)*vec2(91.7,73.3))-0.5)*uIntensity*1.15;
      float v=step(thr, l+n);
      gl_FragColor=vec4(vec3(v),1.0); }`},

  duotone: {name:'Duotone', tag:'2 colors', duo:true, s1:{l:'Strength',d:85}, s2:{l:'Posterize',d:40}, frag:`
    void main(){ vec2 uv=vec2(vUv.x,1.0-vUv.y);
      vec3 src=texture2D(uTex,uv).rgb; float l=luma(adj(src));
      float st=mix(64.0,4.0,uParam); l=floor(l*st)/st; l=smoothstep(0.0,1.0,l);
      gl_FragColor=vec4(mix(src, mix(uColA,uColB,l), uIntensity),1.0); }`},

  neon: {name:'Neon', tag:'outline', duo:true, s1:{l:'Strength',d:85}, s2:{l:'Sensitivity',d:55}, frag:`
    void main(){ vec2 uv=vec2(vUv.x,1.0-vUv.y); vec2 px=1.0/uRes;
      vec3 src=texture2D(uTex,uv).rgb; float c0=luma(src);
      float gx=luma(texture2D(uTex,uv+vec2(px.x,0.0)).rgb)-luma(texture2D(uTex,uv-vec2(px.x,0.0)).rgb);
      float gy=luma(texture2D(uTex,uv+vec2(0.0,px.y)).rgb)-luma(texture2D(uTex,uv-vec2(0.0,px.y)).rgb);
      float edge=smoothstep(0.05,0.5,length(vec2(gx,gy))*mix(1.5,5.0,uParam));
      vec3 dark=vec3(luma(adj(src)))*0.16;
      vec3 neon=mix(uColB,uColA,smoothstep(0.0,1.0,c0));
      gl_FragColor=vec4(mix(src,clamp(dark+neon*edge*2.0,0.0,1.0),uIntensity),1.0); }`},

  flow: {name:'Flow', tag:'smear', s1:{l:'Strength',d:70}, s2:{l:'Scale',d:50}, frag:`
    void main(){ vec2 uv=vec2(vUv.x,1.0-vUv.y); float a=uIntensity;
      float sc=mix(3.0,14.0,uParam);
      float l=luma(texture2D(uTex,uv).rgb);
      vec2 w=vec2(sin(uv.y*sc+uTime+l*6.28), cos(uv.x*sc-uTime*0.8+l*6.28))*0.022*a;
      vec3 c=texture2D(uTex,uv+w).rgb + texture2D(uTex,uv+w*1.8).rgb;
      gl_FragColor=vec4(adj(c*0.5),1.0); }`},

  ascii: {name:'ASCII', tag:'terminal', s1:{l:'Strength',d:90}, s2:{l:'Size',d:50}, frag:`
    uniform sampler2D uGlyphs; uniform float uGlyphCount;
    void main(){ vec2 uv=vec2(vUv.x,1.0-vUv.y);
      float cell=mix(5.0,15.0,uParam); vec2 px=uv*uRes;
      vec2 cid=floor(px/cell); vec2 cuv=(cid+0.5)*cell/uRes;
      float l=luma(adj(texture2D(uTex,cuv).rgb));
      float gi=floor(l*(uGlyphCount-0.001)); vec2 sub=fract(px/cell);
      float glyph=texture2D(uGlyphs,vec2((gi+sub.x)/uGlyphCount,sub.y)).r;
      gl_FragColor=vec4(mix(texture2D(uTex,uv).rgb, vec3(0.12,1.0,0.42)*glyph, uIntensity),1.0); }`},

  /* feedback (special path): Trail */
  trail: {name:'Trail', tag:'exposure', feedback:true, s1:{l:'Amount',d:90}, s2:{l:'Trail length',d:65}},
};
const FX_ORDER = ['clean','bw','duotone','neon','flow','trail','ascii'];

function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s),src); return s; }
function makeProg(fsrc){ const p=gl.createProgram();
  gl.attachShader(p,sh(gl.VERTEX_SHADER,VERT));
  gl.attachShader(p,sh(gl.FRAGMENT_SHADER,PRELUDE+fsrc));
  gl.bindAttribLocation(p,0,'aPos'); gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
  return p; }
const programs={};
FX_ORDER.forEach(k=>{ if(FX[k].frag) programs[k]=makeProg(FX[k].frag); });

const trailProg = makeProg(`uniform sampler2D uPrev; uniform float uDecay;
  void main(){ vec3 cur=adj(texture2D(uTex,vec2(vUv.x,1.0-vUv.y)).rgb);
    vec3 prev=texture2D(uPrev,vUv).rgb;
    gl_FragColor=vec4(max(cur,prev*uDecay),1.0); }`);
const dispProg = makeProg(`uniform sampler2D uAccum;
  void main(){ vec3 cur=adj(texture2D(uTex,vec2(vUv.x,1.0-vUv.y)).rgb);
    vec3 acc=texture2D(uAccum,vUv).rgb;
    gl_FragColor=vec4(mix(cur,acc,uIntensity),1.0); }`);

const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

const RAMP=' .:-=+*#%@';
const glyphTex=gl.createTexture();
(function(){ const n=RAMP.length, cs=16;
  const gc=document.createElement('canvas'); gc.width=n*cs; gc.height=cs; const x=gc.getContext('2d');
  x.fillStyle='#000'; x.fillRect(0,0,gc.width,gc.height);
  x.fillStyle='#fff'; x.font=(cs-2)+'px monospace'; x.textAlign='center'; x.textBaseline='middle';
  for(let i=0;i<n;i++) x.fillText(RAMP[i], i*cs+cs/2, cs/2+1);
  gl.bindTexture(gl.TEXTURE_2D,glyphTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,gc);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
})();

/* ============ Trail feedback buffers ============ */
let acc=null, accReset=true;
function ensureAccum(W,H){
  if(acc && acc.w===W && acc.h===H) return;
  if(acc){ gl.deleteTexture(acc.texA); gl.deleteTexture(acc.texB); gl.deleteFramebuffer(acc.fboA); gl.deleteFramebuffer(acc.fboB); }
  const mk=()=>{ const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,W,H,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
    return {t,f}; };
  const A=mk(), B=mk(); gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  acc={texA:A.t,fboA:A.f,texB:B.t,fboB:B.f,w:W,h:H,readIsA:true}; accReset=true;
}
function clearAccum(){ if(!acc) return; [acc.fboA,acc.fboB].forEach(f=>{
  gl.bindFramebuffer(gl.FRAMEBUFFER,f); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); });
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); accReset=false; }
function setAdj(p){ gl.uniform1f(gl.getUniformLocation(p,'uBright'),state.bright);
  gl.uniform1f(gl.getUniformLocation(p,'uContrast'),state.contrast);
  gl.uniform1f(gl.getUniformLocation(p,'uSat'),state.sat); }

/* ============ state ============ */
const state = { fx:'bw', intensity:0.45, param:0.5, bright:1, contrast:1, sat:1,
  colA:[0.106,0.118,0.231], colB:[0.910,0.635,0.239] };
const hexToRgb = h => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];

/* ============ render ============ */
function uploadSource(source){
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,tex);
  try{ gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,source); return true; }catch(e){ return false; }
}
function renderTrail(source,W,H){
  ensureAccum(W,H);
  if(!uploadSource(source)) return;
  if(accReset) clearAccum();
  const readT = acc.readIsA?acc.texA:acc.texB;
  const writeF = acc.readIsA?acc.fboB:acc.fboA;
  const writeT = acc.readIsA?acc.texB:acc.texA;
  gl.bindFramebuffer(gl.FRAMEBUFFER,writeF); gl.viewport(0,0,W,H);
  gl.useProgram(trailProg);
  gl.uniform1i(gl.getUniformLocation(trailProg,'uTex'),0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,readT);
  gl.uniform1i(gl.getUniformLocation(trailProg,'uPrev'),1);
  gl.uniform1f(gl.getUniformLocation(trailProg,'uDecay'), 0.80+0.17*state.param);
  setAdj(trailProg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.drawArrays(gl.TRIANGLES,0,3);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,W,H);
  gl.useProgram(dispProg);
  gl.uniform1i(gl.getUniformLocation(dispProg,'uTex'),0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,writeT);
  gl.uniform1i(gl.getUniformLocation(dispProg,'uAccum'),1);
  gl.uniform1f(gl.getUniformLocation(dispProg,'uIntensity'),state.intensity);
  setAdj(dispProg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.drawArrays(gl.TRIANGLES,0,3);
  acc.readIsA=!acc.readIsA;
}
function renderGL(timeSec, source){
  source = source || video;
  const sw = source.videoWidth || source.width; if(!sw) return;
  const W=cv.width, H=cv.height;
  if(state.fx==='trail'){ renderTrail(source,W,H); return; }
  if(!uploadSource(source)) return;
  const p=programs[state.fx]; gl.useProgram(p);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,W,H);
  gl.uniform1i(gl.getUniformLocation(p,'uTex'),0);
  if(state.fx==='ascii'){
    gl.uniform1i(gl.getUniformLocation(p,'uGlyphs'),1);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,glyphTex);
    gl.uniform1f(gl.getUniformLocation(p,'uGlyphCount'),RAMP.length);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,tex);
  }
  gl.uniform2f(gl.getUniformLocation(p,'uRes'),W,H);
  gl.uniform1f(gl.getUniformLocation(p,'uTime'),timeSec);
  gl.uniform1f(gl.getUniformLocation(p,'uIntensity'),state.intensity);
  gl.uniform1f(gl.getUniformLocation(p,'uParam'),state.param);
  gl.uniform1f(gl.getUniformLocation(p,'uBright'),state.bright);
  gl.uniform1f(gl.getUniformLocation(p,'uContrast'),state.contrast);
  gl.uniform1f(gl.getUniformLocation(p,'uSat'),state.sat);
  gl.uniform3fv(gl.getUniformLocation(p,'uColA'),state.colA);
  gl.uniform3fv(gl.getUniformLocation(p,'uColB'),state.colB);
  gl.drawArrays(gl.TRIANGLES,0,3);
}
let rafTime=0;
(function previewLoop(){
  if(!exporting){ rafTime=performance.now()/1000; if(video.readyState>=2) renderGL(rafTime); }
  requestAnimationFrame(previewLoop);
})();

/* ============ UI ============ */
const fxControls=$('#fxControls');
function mkSlider(parent,label,val,setter){
  const row=document.createElement('div'); row.className='ctrl';
  row.innerHTML='<div class="ctrl-h"><label>'+label+'</label><span class="val"></span></div>';
  const inp=document.createElement('input'); inp.type='range'; inp.min=0; inp.max=100; inp.step=1; inp.value=val;
  row.appendChild(inp); const valEl=row.querySelector('.val');
  const upd=()=>{ valEl.textContent=Math.round(parseFloat(inp.value))+'%'; setter(parseFloat(inp.value)/100);
    if(video.readyState>=2 && !exporting) renderGL(rafTime); };
  inp.addEventListener('input',upd); parent.appendChild(row); upd(); return inp;
}
function buildFxSliders(){
  fxControls.innerHTML='';
  const f=FX[state.fx];
  if(f.s1) mkSlider(fxControls, f.s1.l, f.s1.d, v=>state.intensity=v);
  if(f.s2) mkSlider(fxControls, f.s2.l, f.s2.d, v=>state.param=v);
  if(!f.s1 && !f.s2){ const d=document.createElement('div'); d.className='ctrl';
    d.innerHTML='<span class="hint" style="font-size:12px;color:var(--muted)">Adjust with Tone below</span>';
    fxControls.appendChild(d); }
}

const fxGrid=$('#fxGrid');
FX_ORDER.forEach(k=>{
  const b=document.createElement('button'); b.className='fx'+(k===state.fx?' on':'');
  b.innerHTML=FX[k].name+'<small>'+FX[k].tag+'</small>';
  b.onclick=()=>{ state.fx=k; accReset=true;
    document.querySelectorAll('.fx').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    duoColors.classList.toggle('hidden', !FX[k].duo);
    buildFxSliders();
    if(video.readyState>=2) renderGL(rafTime); };
  fxGrid.appendChild(b);
});
duoColors.classList.toggle('hidden', !FX[state.fx].duo);
buildFxSliders();

function toneSlider(parent,label,val,setter){
  const row=document.createElement('div'); row.className='ctrl';
  row.innerHTML='<div class="ctrl-h"><label>'+label+'</label><span class="val"></span></div>';
  const inp=document.createElement('input'); inp.type='range'; inp.min=0; inp.max=200; inp.step=1; inp.value=val;
  row.appendChild(inp); const valEl=row.querySelector('.val');
  const upd=()=>{ valEl.textContent=Math.round(parseFloat(inp.value))+'%'; setter(parseFloat(inp.value)/100);
    if(video.readyState>=2 && !exporting) renderGL(rafTime); };
  inp.addEventListener('input',upd); parent.appendChild(row); upd(); return inp;
}
const toneControls=$('#toneControls');
const sB=toneSlider(toneControls,'Brightness',100, v=>state.bright=v);
const sC=toneSlider(toneControls,'Contrast',100, v=>state.contrast=v);
const sS=toneSlider(toneControls,'Saturation',100, v=>state.sat=v);

colA.addEventListener('input',()=>{state.colA=hexToRgb(colA.value); if(video.readyState>=2) renderGL(rafTime);});
colB.addEventListener('input',()=>{state.colB=hexToRgb(colB.value); if(video.readyState>=2) renderGL(rafTime);});
$('#resetFx').onclick=()=>{ buildFxSliders(); if(video.readyState>=2) renderGL(rafTime); };
$('#resetTone').onclick=()=>{ [sB,sC,sS].forEach(s=>{s.value=100; s.dispatchEvent(new Event('input'));}); };
document.querySelectorAll('.fmt').forEach(b=> b.onclick=()=>{
  document.querySelectorAll('.fmt').forEach(x=>x.classList.remove('on')); b.classList.add('on'); exportFmt=b.dataset.fmt; });

/* ============ file ============ */
dz.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{ if(e.target.files[0]) loadVideo(e.target.files[0]); });
['dragover','dragenter'].forEach(ev=> screen.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('hot');}));
['dragleave','drop'].forEach(ev=> screen.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('hot');}));
screen.addEventListener('drop',e=>{ const f=[...e.dataTransfer.files].find(f=>f.type.startsWith('video/')); if(f) loadVideo(f); });
function loadVideo(file){ currentFile=file; accReset=true; video.src=URL.createObjectURL(file);
  video.addEventListener('loadedmetadata',()=>{
    cv.width=video.videoWidth & ~1; cv.height=video.videoHeight & ~1;
    dz.classList.add('hidden'); pp.disabled=false; timeline.disabled=false; exportBtn.disabled=false;
    timeline.max=video.duration; updateTime(); renderGL(0);
  },{once:true});
}

/* transport */
pp.onclick=()=>{ video.paused?video.play():video.pause(); };
video.addEventListener('play',()=>setIcon(true));
video.addEventListener('pause',()=>setIcon(false));
video.addEventListener('ended',()=>setIcon(false));
function setIcon(p){ ppIcon.innerHTML=p?'<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>'; }
video.addEventListener('timeupdate',()=>{ if(!exporting){timeline.value=video.currentTime; updateTime();} });
video.addEventListener('seeked',()=>{ accReset=true; });
timeline.addEventListener('input',()=>{ video.currentTime=parseFloat(timeline.value); });
const fmtT=t=>{t=t||0;const m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+String(s).padStart(2,'0');};
function updateTime(){ timeEl.textContent=fmtT(video.currentTime)+' / '+fmtT(video.duration); }

/* ============ export ============ */
function setExporting(on,label){ exporting=on; exportBtn.disabled=on; pp.disabled=on; timeline.disabled=on;
  prog.classList.toggle('show',on); progFill.style.width='0%';
  exportLabel.textContent= on?(label||'Encoding…'):'Export with effect'; }
function download(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),5000); }
function showWarn(m){ warn.textContent=m; warn.classList.add('show'); }

exportBtn.onclick = exportFast;

async function exportFast(){
  if(!currentFile) return;
  warn.classList.remove('show');
  if(typeof Mediabunny==='undefined'){ showWarn('Failed to load the encoding engine.'); return; }
  const { Input, Output, ALL_FORMATS, BlobSource, CanvasSink, CanvasSource,
          AudioBufferSource, Mp4OutputFormat, WebMOutputFormat, BufferTarget, QUALITY_HIGH } = Mediabunny;

  setExporting(true, exportFmt==='mp4'?'Encoding MP4…':'Encoding WEBM…');
  recNote.textContent='';
  accReset=true;
  const t0=performance.now();

  try{
    const input=new Input({formats:ALL_FORMATS, source:new BlobSource(currentFile)});
    const vTrack=await input.getPrimaryVideoTrack();
    if(!vTrack){ showWarn('No video track in the file.'); setExporting(false); return; }

    const W=(await vTrack.getDisplayWidth()) & ~1;
    const H=(await vTrack.getDisplayHeight()) & ~1;
    cv.width=W; cv.height=H;
    const totalDur=(await vTrack.computeDuration())||video.duration||1;

    const output=new Output({
      format: exportFmt==='mp4'? new Mp4OutputFormat() : new WebMOutputFormat(),
      target: new BufferTarget(),
    });
    const vEnc = exportFmt==='mp4'
      ? {codec:'avc', bitrate:QUALITY_HIGH}
      : {codec:'vp9', bitrate:QUALITY_HIGH, latencyMode:'realtime', keyFrameInterval:8};
    const videoSource=new CanvasSource(cv, vEnc);
    output.addVideoTrack(videoSource);

    let audioSource=null, audioBuffer=null;
    try{
      const aTrack=await input.getPrimaryAudioTrack();
      if(aTrack){
        const ab=await currentFile.arrayBuffer();
        const AC=window.AudioContext||window.webkitAudioContext;
        audioBuffer=await new AC().decodeAudioData(ab.slice(0));
        audioSource=new AudioBufferSource({codec: exportFmt==='mp4'?'aac':'opus', bitrate:QUALITY_HIGH});
        output.addAudioTrack(audioSource);
      }
    }catch(e){ audioSource=null; }

    await output.start();

    const sink=new CanvasSink(vTrack);
    for await (const wrapped of sink.canvases()){
      renderGL(wrapped.timestamp, wrapped.canvas);
      await videoSource.add(wrapped.timestamp, wrapped.duration || (1/30));
      progFill.style.width=Math.min(100,(wrapped.timestamp/totalDur)*100).toFixed(1)+'%';
    }
    if(audioSource && audioBuffer) await audioSource.add(audioBuffer);

    await output.finalize();
    progFill.style.width='100%';
    const blob=new Blob([output.target.buffer], {type: exportFmt==='mp4'?'video/mp4':'video/webm'});
    download(blob, 'video-effects.'+exportFmt);

    const secs=(performance.now()-t0)/1000;
    setExporting(false);
    recNote.textContent='Done in '+secs.toFixed(1)+' s ('+(totalDur/secs).toFixed(1)+'× realtime)';
  }catch(err){
    console.error(err); setExporting(false);
    showWarn(exportFmt==='mp4'
      ? 'Could not encode MP4 (H.264). Open in Chrome/Edge or pick WEBM.'
      : 'Could not encode video in this browser.');
  }
}
